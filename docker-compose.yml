services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: amp
      POSTGRES_PASSWORD: amp
      POSTGRES_DB: amp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - amp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://amp:amp@postgres:5432/amp?sslmode=disable
      WORKSPACE_PATH: /workspace
      NETWORK_NAME: poc-amp_amp-network
      PORT_RANGE_START: "9001"
      PORT_RANGE_END: "9100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace:/workspace
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - amp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - amp-network

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/certs:/etc/envoy/certs:ro
    ports:
      - "10000:10000"
      - "10443:10443"
      - "9901:9901"
    networks:
      - amp-network

  ebpf-agent:
    build:
      context: ./ebpf-agent
      dockerfile: Dockerfile
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    # Uses host networking to capture traffic on bridge interfaces
    # Connects to backend via localhost since backend exposes port 8080
    command: ["-amp-url", "http://localhost:8081", "-log-level", "debug"]
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug
    depends_on:
      - backend
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE

networks:
  amp-network:
    driver: bridge
    labels:
      amp.managed: "true"

volumes:
  postgres_data:
  workspace:
