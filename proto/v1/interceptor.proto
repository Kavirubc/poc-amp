syntax = "proto3";

package rpc.v1;

option go_package = "github.com/poc-amp/backend/proto/v1";

// TransactionService receives intercepted HTTP payloads from Envoy Sidecar
service TransactionService {
  // Stream intercepted HTTP requests and responses
  rpc StreamTransactions(stream TransactionEvent) returns (TransactionResponse);
}

message TransactionEvent {
  string agent_id = 1;
  string session_id = 2;
  
  // The intercepted API call info
  string method = 3;
  string url = 4;
  
  // Call 1: The input sent by the agent
  bytes request_body = 5;
  
  // Call 2: The output returned to the agent
  int32 response_status = 6;
  bytes response_body = 7;
  
  int64 timestamp = 8;
}

message TransactionResponse {
  bool success = 1;
  string message = 2;
}
