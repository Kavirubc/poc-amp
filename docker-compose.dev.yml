services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: sh -c "go install github.com/air-verse/air@latest && air"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://amp:amp@postgres:5432/amp?sslmode=disable
      WORKSPACE_PATH: /workspace
      NETWORK_NAME: poc-amp_amp-network
      PORT_RANGE_START: "9001"
      PORT_RANGE_END: "9100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace:/workspace
      - ./backend:/app
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
